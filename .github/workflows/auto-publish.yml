name: Auto Publish Generated Config

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Build generated config
        env:
          SKIP_SYNC_GUARD: "1"
        run: python3 build.py

      - name: Validate generated config
        run: python3 scripts/validate.py

      - name: Commit generated config
        run: |
          if git diff --quiet -- output/shadowrocket.conf; then
            echo "output/shadowrocket.conf is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/shadowrocket.conf
          git commit -m "Update generated Shadowrocket config [skip ci]"
          git push
