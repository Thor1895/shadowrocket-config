name: Build Shadowrocket Config

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Generate mock OpenAI health
        run: python3 scripts/check_openai.py --mode mock

      - name: Score nodes
        run: python3 scripts/node_scorer.py

      - name: Build config
        env:
          SKIP_SYNC_GUARD: "1"
          SUBSCRIBE_URL: tests/fixtures/mock_subscribe.txt
        run: python3 build.py

      - name: Validate config
        run: python3 scripts/validate.py

      - name: Check architecture complexity
        run: python3 scripts/complexity_check.py

      - name: Run tests
        run: python3 -m pytest -q
